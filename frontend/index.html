<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RaceOracle — Elite Race Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --black:#080810; --dark1:#0D0D1A; --dark2:#12121F; --dark3:#1A1A2E; --dark4:#22223A;
  --gold:#C9A84C; --gold2:#E8C96A; --gold3:#F5E0A0; --goldDim:#7A6330;
  --crimson:#8B1A2E; --crimson2:#C02040;
  --emerald:#1A6B3C; --emerald2:#27A85F;
  --text:#F0EAD6; --text2:#A89870; --text3:#6B6050;
  --border:rgba(201,168,76,0.2); --borderH:rgba(201,168,76,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(201,168,76,0.06) 0%,transparent 60%),
             radial-gradient(ellipse 60% 30% at 80% 100%,rgba(139,26,46,0.08) 0%,transparent 50%);}

@keyframes stripeMove{from{background-position:0 0}to{background-position:80px 0}}
.racing-stripe{height:3px;background:repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 20px,transparent 20px,transparent 40px,var(--crimson2) 40px,var(--crimson2) 60px,transparent 60px,transparent 80px);animation:stripeMove 1.2s linear infinite;}

@keyframes gallop{0%{transform:translateY(0) rotate(-2deg)}25%{transform:translateY(-7px) rotate(1deg)}50%{transform:translateY(-2px) rotate(-1deg)}75%{transform:translateY(-8px) rotate(2deg)}100%{transform:translateY(0) rotate(-2deg)}}
@keyframes hoofDust{0%,100%{opacity:0;transform:scale(0.5)}50%{opacity:0.5;transform:scale(1)}}
.horse-logo{width:52px;height:52px;animation:gallop 0.65s ease-in-out infinite;filter:drop-shadow(0 0 10px rgba(201,168,76,0.5));}

.topbar{position:sticky;top:0;z-index:100;background:rgba(8,8,16,0.96);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:70px;backdrop-filter:blur(12px);}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--crimson2),var(--gold),transparent);opacity:0.5;}
.logo-wrap{display:flex;align-items:center;gap:14px;}
.logo-text{font-family:'Playfair Display',serif;font-size:23px;font-weight:700;letter-spacing:0.5px;color:var(--gold2);text-shadow:0 0 20px rgba(201,168,76,0.3);}
.logo-text span{color:var(--crimson2);}
.logo-tagline{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text3);margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:14px;}
.status-pill{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;color:var(--text2);background:rgba(201,168,76,0.04);}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
.sdot{width:7px;height:7px;border-radius:50%;animation:pulse 2s ease-in-out infinite;}
.btn-gold{padding:9px 22px;border-radius:6px;background:linear-gradient(135deg,var(--gold) 0%,var(--goldDim) 100%);color:var(--black);font-weight:600;font-size:13px;border:none;cursor:pointer;letter-spacing:0.03em;transition:all 0.2s;box-shadow:0 0 20px rgba(201,168,76,0.15);font-family:'Inter',sans-serif;}
.btn-gold:hover:not(:disabled){background:linear-gradient(135deg,var(--gold2) 0%,var(--gold) 100%);box-shadow:0 0 30px rgba(201,168,76,0.3);transform:translateY(-1px);}
.btn-gold:disabled{opacity:0.5;cursor:not-allowed;}
.btn-ghost{padding:9px 16px;border-radius:6px;background:transparent;color:var(--text2);border:1px solid var(--border);font-size:13px;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;}
.btn-ghost:hover{border-color:var(--borderH);color:var(--text);}

.layout{display:flex;position:relative;z-index:1;min-height:calc(100vh - 70px);}
.sidebar{width:262px;flex-shrink:0;background:rgba(13,13,26,0.85);border-right:1px solid var(--border);padding:24px 0;}
.s-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--goldDim);padding:0 20px 10px;font-weight:500;}
.race-item{padding:13px 20px;cursor:pointer;border-left:2px solid transparent;transition:all 0.2s;}
.race-item:hover{background:rgba(201,168,76,0.04);border-left-color:var(--goldDim);}
.race-item.active{background:rgba(201,168,76,0.08);border-left-color:var(--gold);}
.ri-name{font-family:'Playfair Display',serif;font-size:14px;color:var(--text);margin-bottom:3px;}
.ri-meta{font-size:11px;color:var(--text3);}
.ri-badge{display:inline-block;margin-top:6px;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:3px 9px;border-radius:3px;background:rgba(201,168,76,0.1);color:var(--gold2);border:1px solid rgba(201,168,76,0.2);}
.divider{height:1px;margin:20px;background:linear-gradient(90deg,transparent,var(--border),transparent);}
.s-hint{padding:14px 20px;font-size:11px;color:var(--text3);line-height:1.7;}
.s-hint code{color:var(--gold2);font-size:10px;}

.main{flex:1;padding:32px 38px;overflow-y:auto;}
.sec-lbl{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--goldDim);margin-bottom:14px;font-weight:500;}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:30px;}
.metric{background:rgba(13,13,26,0.9);border:1px solid var(--border);border-radius:9px;padding:20px;position:relative;overflow:hidden;transition:border-color 0.3s;}
.metric:hover{border-color:var(--borderH);}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--crimson2));opacity:0.5;}
.m-lbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.m-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1;color:var(--gold2);}
.m-val.sm{font-size:16px;padding-top:5px;line-height:1.35;}
.m-sub{font-size:11px;color:var(--text3);margin-top:6px;}

.horses{display:flex;flex-direction:column;gap:12px;margin-bottom:30px;}
@keyframes cIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hcard{background:rgba(13,13,26,0.9);border:1px solid var(--border);border-radius:10px;padding:20px 24px;cursor:pointer;position:relative;overflow:hidden;transition:all 0.25s;animation:cIn 0.4s ease both;}
.hcard:hover{border-color:var(--borderH);transform:translateX(3px);}
.hcard.exp{border-color:var(--gold);}
.hcard.tp{border-color:rgba(201,168,76,0.45);background:rgba(201,168,76,0.025);}
.hcard.tp::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),var(--crimson2));}
.tp-lbl{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:10px;}
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.hnum{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;border:1px solid var(--border);color:var(--text2);background:rgba(255,255,255,0.03);}
.hnum.g{background:rgba(201,168,76,0.12);border-color:var(--gold);color:var(--gold2);}
.hname{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text);letter-spacing:0.02em;}
.hmeta{font-size:12px;color:var(--text3);margin-top:2px;}
.badges{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;justify-content:flex-end;align-items:center;}
.badge{font-size:10px;padding:4px 10px;border-radius:4px;font-weight:500;letter-spacing:0.05em;border:1px solid;white-space:nowrap;}
.bg{background:rgba(201,168,76,0.1);color:var(--gold2);border-color:rgba(201,168,76,0.3);}
.br{background:rgba(192,32,64,0.1);color:#F47090;border-color:rgba(192,32,64,0.3);}
.ba{background:rgba(192,120,32,0.1);color:#E8A040;border-color:rgba(192,120,32,0.3);}
.bk{background:rgba(255,255,255,0.04);color:var(--text3);border-color:var(--border);}

.prow{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.plbl{font-size:11px;color:var(--text3);width:50px;flex-shrink:0;letter-spacing:0.04em;}
.ptrack{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.pfill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(0.4,0,0.2,1);}
.ppct{font-size:12px;font-weight:600;width:42px;text-align:right;flex-shrink:0;}

@keyframes dIn{from{opacity:0}to{opacity:1}}
.det{margin-top:18px;padding-top:18px;border-top:1px solid rgba(201,168,76,0.12);display:grid;grid-template-columns:1fr 1fr;gap:24px;animation:dIn 0.3s ease both;}
.dtitle{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--goldDim);margin-bottom:10px;font-weight:500;}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.slbl{font-size:11px;color:var(--text2);width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.strack{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.sfill{height:100%;border-radius:2px;}
.sval{font-size:10px;width:36px;text-align:right;font-weight:500;}
.mws{display:flex;gap:8px;margin-top:8px;}
.mw{flex:1;border-radius:6px;padding:10px;text-align:center;border:1px solid var(--border);background:rgba(201,168,76,0.04);}
.mwv{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold2);}
.mwl{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:0.08em;text-transform:uppercase;}
.nitem{display:flex;gap:8px;align-items:flex-start;margin-bottom:7px;}
.ndot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.ntxt{font-size:12px;color:var(--text2);line-height:1.6;}
.hhint{font-size:11px;color:var(--text3);margin-top:10px;letter-spacing:0.02em;}

.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.panel{background:rgba(13,13,26,0.9);border:1px solid var(--border);border-radius:10px;padding:20px 24px;}
.ptitle{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--goldDim);margin-bottom:16px;font-weight:500;}
.arow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(201,168,76,0.07);font-size:13px;color:var(--text2);}
.arow:last-child{border-bottom:none;}
.frow{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.fname{font-size:12px;color:var(--text2);width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ftrack{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.ffill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--crimson2));}
.fpct{font-size:12px;font-weight:600;color:var(--gold2);width:38px;text-align:right;}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{from{background-position:-200% center}to{background-position:200% center}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:360px;gap:20px;}
.lring{width:56px;height:56px;border-radius:50%;border:3px solid rgba(201,168,76,0.1);border-top-color:var(--gold);animation:spin 0.9s linear infinite;}
.ltxt{font-family:'Playfair Display',serif;font-size:16px;background:linear-gradient(90deg,var(--gold),var(--gold3),var(--gold));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 2s linear infinite;}
.ebox{border:1px solid rgba(192,32,64,0.3);background:rgba(192,32,64,0.06);border-radius:8px;padding:14px 18px;font-size:13px;color:#F47090;margin-bottom:24px;}

@media(max-width:1100px){.metrics{grid-template-columns:repeat(2,1fr)}.panels{grid-template-columns:1fr}}
@media(max-width:800px){.sidebar{display:none}.det{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const BASE="http://localhost:8000/api/v1";

async function apiFetch(path,method="GET",body=null){
  const res=await fetch(`${BASE}${path}`,{method,headers:{"Content-Type":"application/json"},body:body?JSON.stringify(body):undefined});
  if(!res.ok){const e=await res.json().catch(()=>({detail:res.statusText}));throw new Error(e.detail||"API error");}
  return res.json();
}

function HorseLogo(){
  return(
    <svg className="horse-logo" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="30" cy="34" rx="16" ry="10" fill="#C9A84C" opacity="0.9"/>
      <path d="M38 28 Q42 20 40 14 Q38 10 35 12 Q33 16 34 22 Q35 26 38 28Z" fill="#C9A84C"/>
      <ellipse cx="37" cy="11" rx="5" ry="6" fill="#C9A84C" transform="rotate(-20 37 11)"/>
      <path d="M34 7 Q35 4 37 5 Q36 7 34 7Z" fill="#C9A84C"/>
      <circle cx="39" cy="10" r="1" fill="#080810"/>
      <ellipse cx="40" cy="13" rx="1" ry="0.6" fill="#7A6330" transform="rotate(-20 40 13)"/>
      <path d="M36 10 Q40 8 41 12 Q39 11 36 12 Q38 9 36 10Z" fill="#E8C96A" opacity="0.8"/>
      <path d="M14 32 Q8 28 6 34 Q10 38 16 36" fill="none" stroke="#C9A84C" strokeWidth="2.5" strokeLinecap="round"/>
      <path d="M14 32 Q7 32 5 38 Q9 40 15 38" fill="none" stroke="#E8C96A" strokeWidth="1.5" strokeLinecap="round" opacity="0.6"/>
      <line x1="22" y1="42" x2="20" y2="55" stroke="#C9A84C" strokeWidth="2.5" strokeLinecap="round"/>
      <line x1="27" y1="43" x2="26" y2="55" stroke="#C9A84C" strokeWidth="2.5" strokeLinecap="round"/>
      <line x1="33" y1="43" x2="35" y2="55" stroke="#C9A84C" strokeWidth="2.5" strokeLinecap="round"/>
      <line x1="38" y1="42" x2="40" y2="55" stroke="#C9A84C" strokeWidth="2.5" strokeLinecap="round"/>
      <rect x="18" y="53" width="5" height="3" rx="1" fill="#7A6330"/>
      <rect x="24" y="54" width="5" height="3" rx="1" fill="#7A6330"/>
      <rect x="33" y="54" width="5" height="3" rx="1" fill="#7A6330"/>
      <rect x="38" y="53" width="5" height="3" rx="1" fill="#7A6330"/>
      <circle cx="16" cy="57" r="2.5" fill="#7A6330" opacity="0.25" style={{animation:"hoofDust 0.65s ease-in-out infinite"}}/>
      <circle cx="42" cy="57" r="2" fill="#7A6330" opacity="0.2" style={{animation:"hoofDust 0.65s ease-in-out 0.32s infinite"}}/>
    </svg>
  );
}

function ProbBar({label,pct,color}){
  return(
    <div className="prow">
      <span className="plbl">{label}</span>
      <div className="ptrack"><div className="pfill" style={{width:`${pct}%`,background:color}}/></div>
      <span className="ppct" style={{color}}>{pct}%</span>
    </div>
  );
}

function ShapSection({drivers=[],risks=[]}){
  const all=[...drivers,...risks];
  const mx=Math.max(...all.map(d=>Math.abs(d.impact)),1);
  return(
    <div>
      <div className="dtitle">SHAP — probability drivers</div>
      {drivers.slice(0,4).map((d,i)=>(
        <div className="srow" key={i}>
          <span className="slbl">{d.feature.replace(/_/g," ")}</span>
          <div className="strack"><div className="sfill" style={{width:`${(Math.abs(d.impact)/mx)*100}%`,background:"linear-gradient(90deg,#1A6B3C,#4ED890)"}}/></div>
          <span className="sval" style={{color:"#4ED890"}}>+{d.impact.toFixed(1)}</span>
        </div>
      ))}
      {risks.slice(0,3).map((r,i)=>(
        <div className="srow" key={i}>
          <span className="slbl">{r.feature.replace(/_/g," ")}</span>
          <div className="strack"><div className="sfill" style={{width:`${(Math.abs(r.impact)/mx)*100}%`,background:"linear-gradient(90deg,#8B1A2E,#C02040)"}}/></div>
          <span className="sval" style={{color:"#F47090"}}>{r.impact.toFixed(1)}</span>
        </div>
      ))}
    </div>
  );
}

function HorseCard({horse,expanded,onToggle,delay}){
  const isTop=horse.rank===1;
  const wc=horse.win_prob>=28?"#4ED890":horse.win_prob>=18?"#E8A040":"#6B6050";
  return(
    <div className={`hcard ${expanded?"exp":""} ${isTop?"tp":""}`} onClick={onToggle} style={{animationDelay:`${delay}s`}}>
      {isTop&&<div className="tp-lbl">★ AI Top Selection</div>}
      <div className="hdr">
        <div className={`hnum ${isTop?"g":""}`}>{horse.rank}</div>
        <div style={{flex:1}}>
          <div className="hname">{horse.name}</div>
          <div className="hmeta">{horse.jockey} · {horse.trainer} · Form: {horse.form}</div>
        </div>
        <div className="badges">
          {isTop&&<span className="badge bg">Top pick</span>}
          {horse.risk_flags?.filter(f=>f.severity==="critical"||f.severity==="high").map((f,i)=>(
            <span key={i} className={`badge ${f.severity==="critical"?"br":"ba"}`}>
              {f.label.replace(/[🔴🟡🟠⚪]/g,"").trim()}
            </span>
          ))}
          <span className="badge bk">{horse.confidence}% conf</span>
        </div>
      </div>
      <ProbBar label="Win"   pct={horse.win_prob}  color={wc}/>
      <ProbBar label="Top 2" pct={horse.top2_prob} color="rgba(201,168,76,0.85)"/>
      <ProbBar label="Top 3" pct={horse.top3_prob} color="rgba(201,168,76,0.4)"/>
      {expanded&&(
        <div className="det">
          <ShapSection drivers={horse.top_drivers||[]} risks={horse.top_risks||[]}/>
          <div>
            <div className="dtitle">Signal trust</div>
            <div className="mws">
              {["structured","odds","news"].map(k=>(
                <div className="mw" key={k}>
                  <div className="mwv">{horse.modal_weights?.[k]??33}%</div>
                  <div className="mwl">{k}</div>
                </div>
              ))}
            </div>
            {(horse.risk_flags?.length>0||horse.news_summary)&&(
              <div style={{marginTop:16}}>
                <div className="dtitle">Intelligence flags</div>
                {horse.risk_flags?.map((f,i)=>(
                  <div className="nitem" key={i}>
                    <div className="ndot" style={{background:f.severity==="critical"?"#C02040":f.severity==="high"?"#E8A040":"#7A6330"}}/>
                    <span className="ntxt">{f.label.replace(/[🔴🟡🟠⚪]/g,"").trim()}</span>
                  </div>
                ))}
                {horse.news_summary&&(
                  <div className="nitem">
                    <div className="ndot" style={{background:"#7A6330"}}/>
                    <span className="ntxt">{horse.news_summary}</span>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      )}
      {!expanded&&<div className="hhint">Click to expand · SHAP analysis · signal trust · intelligence flags</div>}
    </div>
  );
}

const RACES=[{id:"demo",label:"Royal Ascot — Race 3",meta:"1m4f · Good to Firm",badge:"Live Demo"}];
const ACCURACY=[
  ["Top-pick accuracy","38.6%","#4ED890"],
  ["Top-2 accuracy","~62%","#4ED890"],
  ["vs random baseline","3.8×","var(--gold2)"],
  ["Training races","2,706","var(--text2)"],
  ["Dataset period","Sep–Dec 2020","var(--text3)"],
  ["Model version","v1-surgical","var(--text3)"],
];

function App(){
  const [race,setRace]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [expanded,setExpanded]=useState(null);
  const [apiStatus,setApiStatus]=useState("checking");
  const [activeRace,setActiveRace]=useState("demo");

  const checkHealth=useCallback(async()=>{
    try{const h=await apiFetch("/health");setApiStatus(h.status==="ok"?"online":"degraded");}
    catch{setApiStatus("offline");}
  },[]);

  const loadDemo=useCallback(async()=>{
    setLoading(true);setError(null);setExpanded(null);
    try{setRace(await apiFetch("/predict/demo"));}
    catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{checkHealth();loadDemo();},[]);

  const horses=race?.horses??[];
  const maxWin=horses.length?Math.max(...horses.map(h=>h.win_prob)):1;
  const dc=apiStatus==="online"?"#4ED890":apiStatus==="offline"?"#C02040":"#E8A040";

  return(
    <div style={{minHeight:"100vh",position:"relative",zIndex:1}}>
      <div className="racing-stripe"/>
      <div className="topbar">
        <div className="logo-wrap">
          <HorseLogo/>
          <div>
            <div className="logo-text">Race<span>Oracle</span></div>
            <div className="logo-tagline">Elite AI Race Intelligence</div>
          </div>
        </div>
        <div className="topbar-right">
          <div className="status-pill">
            <span className="sdot" style={{background:dc,boxShadow:`0 0 8px ${dc}`}}/>
            API {apiStatus}
          </div>
          <button className="btn-ghost" onClick={loadDemo} disabled={loading}>↺ Refresh</button>
          <button className="btn-gold" onClick={loadDemo} disabled={loading}>{loading?"Analysing…":"Run Prediction"}</button>
        </div>
      </div>

      <div className="layout">
        <div className="sidebar">
          <div className="s-label">Race Schedule</div>
          {RACES.map(r=>(
            <div key={r.id} className={`race-item ${activeRace===r.id?"active":""}`} onClick={()=>{setActiveRace(r.id);loadDemo();}}>
              <div className="ri-name">{r.label}</div>
              <div className="ri-meta">{r.meta}</div>
              <span className="ri-badge">{r.badge}</span>
            </div>
          ))}
          <div className="divider"/>
          <div className="s-hint">POST to <code>/api/v1/predict</code> to load real race cards from any data source.</div>
        </div>

        <div className="main">
          {error&&<div className="ebox">⚠ {error} — ensure the API is running: uvicorn backend.api.main:app --port 8000</div>}
          {loading&&(
            <div className="loading">
              <div className="lring"/>
              <div className="ltxt">Analysing race intelligence…</div>
            </div>
          )}
          {!loading&&race&&(
            <>
              <div className="sec-lbl">Race overview</div>
              <div className="metrics">
                <div className="metric">
                  <div className="m-lbl">Race</div>
                  <div className="m-val sm">{race.race_name}</div>
                  <div className="m-sub">{race.track} · {race.going}</div>
                </div>
                <div className="metric">
                  <div className="m-lbl">AI Selection</div>
                  <div className="m-val sm" style={{color:"var(--gold2)"}}>{race.top_pick}</div>
                  <div className="m-sub">{race.horses[0]?.win_prob}% win probability</div>
                </div>
                <div className="metric">
                  <div className="m-lbl">Model Confidence</div>
                  <div className="m-val">{race.model_confidence}%</div>
                  <div className="m-sub">{race.model_version}</div>
                </div>
                <div className="metric">
                  <div className="m-lbl">Inference</div>
                  <div className="m-val" style={{color:"var(--emerald2)"}}>{race.inference_ms}ms</div>
                  <div className="m-sub">{race.field_size} runners analysed</div>
                </div>
              </div>

              <div className="sec-lbl">Field analysis</div>
              <div className="horses">
                {horses.map((h,i)=>(
                  <HorseCard key={h.name} horse={h} expanded={expanded===i} onToggle={()=>setExpanded(expanded===i?null:i)} delay={i*0.07}/>
                ))}
              </div>

              <div className="sec-lbl">Intelligence dashboard</div>
              <div className="panels">
                <div className="panel">
                  <div className="ptitle">Model performance</div>
                  {ACCURACY.map(([l,v,c])=>(
                    <div className="arow" key={l}>
                      <span>{l}</span>
                      <span style={{fontWeight:600,color:c}}>{v}</span>
                    </div>
                  ))}
                </div>
                <div className="panel">
                  <div className="ptitle">Win probability — field overview</div>
                  {horses.map(h=>(
                    <div className="frow" key={h.name}>
                      <span className="fname">{h.name}</span>
                      <div className="ftrack"><div className="ffill" style={{width:`${(h.win_prob/maxWin)*100}%`}}/></div>
                      <span className="fpct">{h.win_prob}%</span>
                    </div>
                  ))}
                </div>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
